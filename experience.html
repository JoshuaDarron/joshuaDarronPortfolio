<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<script>
		// Legacy URL redirect: experience.html?company=slug -> /experience/slug
		var slug = new URLSearchParams(window.location.search).get('company');
		if (slug) {
			window.location.replace('/experience/' + slug);
		} else {
			window.location.replace('/');
		}
	</script>
</head>
<body></body>
</html>
